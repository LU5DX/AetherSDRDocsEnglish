site_name: AetherSDR User Manual
site_description: User documentation for AetherSDR — a native Qt6 SmartSDR-compatible client for any FlexRadio transceiver running SmartSDR firmware v3.x or v4.x. Runs on Linux, macOS, and Windows without Wine or virtual machines.
site_author: AetherSDR community
site_url: https://lu5dx.github.io/AetherSDRDocsEnglish/

repo_name: LU5DX/AetherSDRDocsEnglish
repo_url: https://github.com/LU5DX/AetherSDRDocsEnglish
edit_uri: edit/main/docs/

